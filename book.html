  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.45/dist/lenis.min.js"></script>

  <script>
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const touch   = window.matchMedia('(pointer: coarse)').matches;

    if (!reduced) {
      const lenis = new Lenis({
        duration: 1.15,
        easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
        smoothWheel: true,
      });
      gsap.ticker.add(time => lenis.raf(time * 1000));
      gsap.ticker.lagSmoothing(0);
    }

    /* Page entrance */
    if (!reduced) {
      gsap.from('.book-cover img', {
        opacity: 0, y: 30, duration: 1.0, ease: 'power3.out', delay: 0.1,
      });
      gsap.from('.book-details > *', {
        opacity: 0, y: 24, duration: 0.8, ease: 'power3.out',
        stagger: 0.1, delay: 0.2,
      });
    }

    /* GSAP fallback for reveal when CSS animation-timeline unsupported */
    const supportsCSSTimeline = CSS.supports('animation-timeline', 'view()');
    if (!reduced && !supportsCSSTimeline) {
      gsap.utils.toArray('.reveal').forEach((el, i) => {
        gsap.from(el, {
          opacity: 0, y: 24, duration: 0.7, ease: 'power3.out',
          delay: (i % 4) * 0.07,
          scrollTrigger: { trigger: el, start: 'top 88%' }
        });
      });
    }

    /* Magnetic buy links */
    if (!touch && !reduced) {
      document.querySelectorAll('.buy-link').forEach(el => {
        el.addEventListener('mousemove', e => {
          const r  = el.getBoundingClientRect();
          const dx = (e.clientX - (r.left + r.width  / 2)) * 0.2;
          const dy = (e.clientY - (r.top  + r.height / 2)) * 0.2;
          gsap.to(el, { x: dx, y: dy, duration: 0.35, ease: 'power2.out' });
        });
        el.addEventListener('mouseleave', () => {
          gsap.to(el, { x: 0, y: 0, duration: 0.65, ease: 'elastic.out(1, 0.5)' });
        });
      });
    }
  </script>
